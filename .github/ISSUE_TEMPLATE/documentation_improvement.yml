name: 📖 Documentation Improvement
description: Fix typos, improve README, or add inline code comments
title: "[DOCS]: <Short, descriptive title>"
labels: ["documentation", "good first issue"]
body:
  - type: textarea
    id: fix
    attributes:
      label: What needs to be documented or fixed?
      description: Be specific about the file (e.g., `README.md`, `CONTRIBUTING.md`, or a specific `.tsx` file).
    validations:
      required: true
